<style>
:root{
  --cream:#fdf4e3; --cream-shade:#f5ead0; --ink:#1a1a1a;
  --pink:#ff4f93; --yellow:#ffd23f; --mint:#6ee7b7; --orange:#fb923c; --sky:#38bdf8;
  --muted:#6d675c; --mint-tint:#eafaf2; --pink-tint:#ffeaf2;
  --rubik:'Rubik','Heebo',system-ui,sans-serif; --heebo:'Heebo','Rubik',sans-serif;
  --grotesk:'Space Grotesk',sans-serif; --bungee:'Bungee','Rubik',sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--cream);
  background-image:radial-gradient(circle at 1px 1px, rgba(26,26,26,.07) 1.1px, transparent 1.1px);
  background-size:22px 22px; color:var(--ink); font-family:var(--heebo);
  font-size:16px; line-height:1.65; -webkit-font-smoothing:antialiased;
}
.frame{min-height:100vh;display:flex;flex-direction:column}
.masthead{display:flex;justify-content:space-between;align-items:center;padding:16px clamp(18px,5vw,52px);border-bottom:2.5px solid var(--ink);background:var(--cream)}
.brand{display:flex;align-items:baseline;gap:12px}
.brand .en{font-family:var(--bungee);font-size:13px;letter-spacing:.06em}
.brand .he{font-family:var(--rubik);font-weight:700;font-size:13.5px;color:var(--muted)}
.counter{font-family:var(--grotesk);font-weight:700;font-size:13px;letter-spacing:.14em}
.counter b{background:var(--yellow);border:2px solid var(--ink);border-radius:8px;padding:2px 10px;margin-inline-end:8px;font-weight:700}
.progress{height:10px;border-bottom:2.5px solid var(--ink);background:var(--cream-shade);position:relative;overflow:hidden}
.progress span{position:absolute;top:0;right:0;height:100%;width:0%;background:repeating-linear-gradient(-45deg,var(--yellow) 0 10px,#f4c321 10px 20px);border-left:2.5px solid var(--ink);transition:width .45s cubic-bezier(.4,0,.2,1)}
main{flex:1;display:flex;justify-content:center;padding:clamp(30px,6vh,72px) 18px 70px}
.screen{width:100%;max-width:720px;animation:rise .4s cubic-bezier(.22,.8,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.eyebrow{display:flex;justify-content:space-between;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.chip{display:inline-block;background:#fff;border:2px solid var(--ink);border-radius:100px;padding:5px 16px;font-family:var(--rubik);font-weight:700;font-size:13px;box-shadow:3px 3px 0 var(--ink)}
.world{font-family:var(--bungee);font-size:12px;letter-spacing:.1em;color:var(--muted)}
h1.display{font-family:var(--rubik);font-weight:900;font-size:clamp(32px,6vw,50px);line-height:1.2;letter-spacing:-.01em}
h1.display mark{background:linear-gradient(transparent 58%, var(--yellow) 58%);padding:0 2px}
h2.qtext{font-family:var(--rubik);font-weight:800;font-size:clamp(21px,3.2vw,27px);line-height:1.5;margin-bottom:24px}
.lede{color:var(--muted);font-size:17px;max-width:58ch;margin:20px 0 30px}
.qhint{color:var(--muted);font-size:15px;margin:-10px 0 22px}
/* fields */
.field{margin:6px 0 24px}
.field label{font-family:var(--rubik);font-weight:700;font-size:13px;display:block;margin-bottom:8px}
.field input{width:100%;max-width:400px;font-family:var(--rubik);font-weight:700;font-size:19px;color:var(--ink);background:#fff;border:2.5px solid var(--ink);border-radius:12px;padding:11px 16px;box-shadow:3px 3px 0 var(--ink)}
.field input:focus{outline:none;box-shadow:3px 3px 0 var(--sky)}
.field-row{display:flex;gap:16px;flex-wrap:wrap}
.field-row .field{flex:1;min-width:200px;margin-bottom:8px}
.field-row .field input{max-width:none}
/* textarea */
textarea.answer{width:100%;font-family:var(--heebo);font-weight:400;font-size:17px;line-height:1.7;color:var(--ink);background:#fff;border:2.5px solid var(--ink);border-radius:12px;padding:14px 16px;box-shadow:3px 3px 0 var(--ink);resize:vertical;min-height:140px}
textarea.answer:focus{outline:none;box-shadow:3px 3px 0 var(--sky)}
/* yes/no + rating options */
.opts{display:flex;flex-direction:column;gap:12px}
.opt{display:flex;align-items:center;gap:16px;width:100%;text-align:right;background:#fff;border:2.5px solid var(--ink);border-radius:12px;padding:15px 16px;cursor:pointer;font:inherit;color:var(--ink);box-shadow:3px 3px 0 var(--ink);transition:transform .12s, box-shadow .12s, background .12s}
.opt:hover{transform:translate(2px,-2px);box-shadow:5px 5px 0 var(--ink)}
.opt.sel{background:var(--mint-tint);box-shadow:4px 4px 0 var(--mint)}
.opt.sel .key{background:var(--mint)}
.opt .key{flex:0 0 auto;width:32px;height:32px;border:2px solid var(--ink);border-radius:9px;display:flex;align-items:center;justify-content:center;background:var(--yellow);font-family:var(--rubik);font-weight:800;font-size:15px}
.opt .txt{font-size:17px;font-weight:600}
.rating{display:flex;gap:10px;flex-wrap:wrap}
.rbtn{width:54px;height:54px;border:2.5px solid var(--ink);border-radius:12px;background:#fff;font-family:var(--rubik);font-weight:800;font-size:20px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);transition:transform .12s,box-shadow .12s,background .12s}
.rbtn:hover{transform:translate(2px,-2px);box-shadow:5px 5px 0 var(--ink)}
.rbtn.sel{background:var(--yellow);box-shadow:4px 4px 0 var(--orange)}
/* nav */
.nav{display:flex;justify-content:space-between;align-items:center;margin-top:30px;gap:12px}
.btn{font-family:var(--rubik);font-weight:800;font-size:15.5px;background:var(--ink);color:var(--cream);border:2.5px solid var(--ink);border-radius:12px;padding:13px 32px;cursor:pointer;box-shadow:4px 4px 0 var(--yellow);transition:transform .12s, box-shadow .12s}
.btn:not(:disabled):hover{transform:translate(2px,-2px);box-shadow:6px 6px 0 var(--yellow)}
.btn:disabled{background:var(--cream-shade);color:#b3ac9e;border-color:#b3ac9e;box-shadow:none;cursor:not-allowed}
.btn.ghost{background:transparent;color:var(--ink);border:2.5px solid var(--ink);box-shadow:3px 3px 0 var(--ink);font-weight:700}
.btn.ghost:not(:disabled):hover{box-shadow:5px 5px 0 var(--ink)}
.hint{font-family:var(--grotesk);font-size:11.5px;letter-spacing:.08em;color:var(--muted);margin-top:18px}
/* illustration figure */
figure.illo{margin:0 0 28px;background:#fff;border:3px solid var(--ink);border-radius:14px;box-shadow:6px 6px 0 var(--yellow);display:flex;align-items:center;justify-content:center;height:150px;overflow:hidden}
figure.illo svg{max-width:100%;height:auto}
/* finish */
.verdict{background:#fff;border:3px solid var(--ink);border-radius:16px;padding:34px 28px;box-shadow:9px 9px 0 var(--mint);margin-bottom:24px;text-align:center}
.verdict .lvl-en{font-family:var(--bungee);font-size:12px;letter-spacing:.22em;color:var(--muted);margin-bottom:10px}
.verdict h2{font-family:var(--rubik);font-weight:900;font-size:clamp(30px,5vw,44px);line-height:1.15}
.verdict p{margin-top:14px;font-size:17px;color:var(--muted)}
/* submit feedback */
.fb{margin-top:12px;font-family:var(--grotesk);font-weight:700;font-size:14px}
.fb.bad{color:var(--pink)}
.linkbtn{background:none;border:none;font:inherit;color:inherit;text-decoration:underline;cursor:pointer;padding:0}
</style>
</head>

const API_URL = "https://script.google.com/macros/s/AKfycbzmgmK8D84lfwPcGhnsPT5eg9M35tZ_tGSmKzw4NGKs8wsynM6PQeat4dyYAUfn73RLug/exec";
const API_TOKEN = "2f8ea392126249cd2144433b";
async function api(payload){
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({ token: API_TOKEN }, payload))
  });
  if (!res.ok) throw new Error("HTTP " + res.status);
  const json = await res.json();
  if (!json.ok) throw new Error(json.error || "server error");
  return json;
}

const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
const el = id => document.getElementById(id);
const screen = () => el("screen");

function setProgress(){
  el("bar").style.width = (step/7*100) + "%";
  el("counter").style.visibility = step>=7 ? "hidden" : "visible";
  el("cnum").textContent = Math.min(step+1,7);
}

function render(){
  setProgress();
  if(step===0) return renderIntro();
  if(step>=1 && step<=6) return renderQ(QS[step]);
  return renderFinish();
}

    <p class="lede">שיחקתם במשחק? עכשיו תנתחו אותו. ענו על כמה שאלות קצרות — והביקורת נשלחת ישירות למורה.</p>
    <div class="field-row">
      <div class="field"><label for="f-name">השם שלך</label><input id="f-name" placeholder="שם מלא" value="${esc(data.name)}"></div>
      <div class="field"><label for="f-game">שם המשחק ששיחקת</label><input id="f-game" placeholder="לדוגמה: מצא את הצורה" value="${esc(data.game)}"></div>
    </div>
    <div class="nav"><span></span><button class="btn" id="next" disabled>בואו נתחיל</button></div>
    <p class="hint">הביקורת מגיעה למורה כטבלה ונשמרת בגיליון מרוכז.</p>`;
  const nm=el("f-name"), gm=el("f-game"), nx=el("next");
  const chk=()=>{ data.name=nm.value.trim(); data.game=gm.value.trim(); nx.disabled=!(data.name&&data.game); };
  nm.oninput=chk; gm.oninput=chk; chk(); nm.focus();
  api({ action:"ping" }).catch(()=>{});
  nx.onclick=()=>{ step=1; render(); };
}

function renderQ(q){
  let body="";
  if(q.type==="yesno"){
    body = `<div class="opts">
      <button class="opt ${data[q.key]==="כן"?"sel":""}" data-v="כן"><span class="key">&#10003;</span><span class="txt">כן</span></button>
      <button class="opt ${data[q.key]==="לא"?"sel":""}" data-v="לא"><span class="key">&#10005;</span><span class="txt">לא</span></button>
    </div>`;
  } else if(q.type==="text"){
    body = `<textarea class="answer" id="ta" placeholder="${q.ph}">${esc(data[q.key])}</textarea>`;
  } else if(q.type==="rating"){
    let r=""; for(let i=1;i<=10;i++){ r+=`<button class="rbtn ${String(data[q.key])===String(i)?"sel":""}" data-v="${i}">${i}</button>`; }
    body = `<div class="rating">${r}</div>`;
  }
  screen().innerHTML = `
    <div class="eyebrow"><span class="chip">ביקורת משחק</span><span class="world">${data.game ? esc(data.game) : "GAME REVIEW"}</span></div>
    <figure class="illo" aria-hidden="true">${ILLO[step]}</figure>
    <h2 class="qtext">${q.t}</h2>
    ${body}
    <div class="nav">
      <button class="btn ghost" id="prev">הקודם</button>
      <button class="btn" id="next">${step===6?"שליחת הביקורת":"הבא"}</button>
    </div>`;
  el("prev").onclick=()=>{ saveQ(q); step--; render(); };
  if(step===6){
    el("next").onclick=()=>{ saveQ(q); submitReview(el("next")); };
  } else {
    el("next").onclick=()=>{ saveQ(q); step++; render(); };
  }
  if(q.type==="text"){ el("ta").focus(); }
  screen().querySelectorAll(".opt,.rbtn").forEach(b=>{
    b.onclick=()=>{ data[q.key]=b.dataset.v; render(); };
  });
}
function saveQ(q){ if(q.type==="text"){ const ta=el("ta"); if(ta) data[q.key]=ta.value; } }

function showSubmitError(){
  let fb = el("submit-fb");
  if(!fb){ fb = document.createElement("p"); fb.id = "submit-fb"; fb.className = "fb bad"; el("next").insertAdjacentElement("afterend", fb); }
  fb.innerHTML = `שגיאה בשליחה — <button class="linkbtn" id="retry-btn">נסו שוב</button>`;
  el("retry-btn").onclick = () => submitReview(document.getElementById("next"));
}

async function submitReview(btn){
  btn.disabled = true;
  const old = btn.textContent;
  btn.textContent = "שולח ביקורת…";
  const fb = el("submit-fb");
  if(fb) fb.remove();
  try {
    await api({ action:"review", name:data.name, game:data.game,
      q1:data.q1, q2:data.q2, q3:data.q3, q4:data.q4, q5:data.q5, q6:data.q6 });
    step = 7; render();
  } catch(err) {
    btn.disabled = false;
    btn.textContent = old;
    showSubmitError();
  }
}

function renderFinish(){
  screen().innerHTML = `
    <div class="verdict">
      <div class="lvl-en">REVIEW SENT</div>
      <h2>תודה, ${data.name ? esc(data.name) : "שחקן"}!</h2>
      <p>הביקורת שלך על &#171;${data.game ? esc(data.game) : "המשחק"}&#187; נשלחה למורה ונשמרה.</p>
    </div>
    <div class="nav"><span></span><button class="btn ghost" id="again">ביקורת על משחק נוסף</button></div>`;
  el("again").onclick=()=>{ step=0; for(const k in data) data[k]=""; render(); };
}

render();
</script>
</body>
</html>
